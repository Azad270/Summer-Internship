<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Buttons</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    min-height:100vh;
    background:#f5f5f5;
    font-family:Arial;
}

/* Button 1 */
.liquid-btn{
    position:relative;
    padding:15px 45px;
    border:2px solid #00c3ff;
    background:transparent;
    color:#00c3ff;
    font-size:18px;
    cursor:pointer;
    overflow:hidden;
    transition:.5s;
}

.liquid-btn::before{
    content:"";
    position:absolute;
    left:0;
    bottom:-100%;
    width:100%;
    height:100%;
    background:#00c3ff;
    border-radius:50% 50% 0 0;
    transition:.5s;
    z-index:-1;
}

.liquid-btn:hover::before{
    bottom:0;
    border-radius:0;
}

.liquid-btn:hover{
    color:white;
}

/* Button 2 */
.btn2{
    padding:12px 28px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:.4s;
}
.btn2:hover{
    transform:scale(1.08);
    box-shadow:0 0 10px #0d6efd,0 0 25px #0d6efd,0 0 45px #0d6efd;
}

/* Button 3 */
.btn3{
    padding:12px 28px;
    background:white;
    border:2px solid black;
    position:relative;
    cursor:pointer;
    overflow:hidden;
}
.btn3::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:0;
    height:3px;
    background:red;
    transition:.4s;
}
.btn3:hover::after{
    width:100%;
}

/* Button 4 */
.btn4{
    padding:12px 28px;
    border:none;
    background:#28a745;
    color:white;
    position:relative;
    overflow:hidden;
    cursor:pointer;
}
.btn4::before{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    background:rgba(255,255,255,.5);
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%) scale(0);
    transition:.5s;
}
.btn4:hover::before{
    transform:translate(-50%,-50%) scale(15);
    opacity:0;
}

/* Button 5 */
.btn5{
    padding:12px 28px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}
.btn5:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 25px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<button class="liquid-btn">Hover me</button>
<button class="btn2">Button 2</button>
<button class="btn3">Button 3</button>
<button class="btn4">Button 4</button>
<button class="btn5">Button 5</button>

</body>
</html>
