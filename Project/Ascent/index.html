<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>ASCENT | Track. Rise. Repeat.</title>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

        <!-- CSS -->
        <link rel="stylesheet" href="css/global.css">
        <link rel="stylesheet" href="css/login.css">
    </head>
    <body>
        
        <!-- Animated Background -->
        <div class="background">
            <div class="grid"></div>
            <div class="glow glow1"></div>
            <div class="glow glow2"></div>
            <div class="particles"></div>
        </div>

        <!-- Login Card -->
        <main class="login-container">
            <section class="login-card">
                <p class="system-status">
                    SYSTEM ONLINE<br>
                    v1.0.0
                </p>
                <h1 class="logo">ASCENT</h1>
                <p class="tagline">
                    Track. Rise. Repeat.
                </p>
                <div class="divider"></div>
                <h2>SYSTEM AUTHORIZATION</h2>
                <form>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input
                            type="email"
                            placeholder="Email Address"
                            required>
                    </div>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input
                            type="password"
                            placeholder="Password"
                            required>
                    </div>

                    <button type="submit">
                        <i class="fa-solid fa-arrow-right"></i>
                        Enter System
                    </button>
                </form>
                <p class="register-text">
                    New to ASCENT?
                    <a href="register.html">Create Account</a>
                </p>
            </section>
        </main>

    </body>

</html>
